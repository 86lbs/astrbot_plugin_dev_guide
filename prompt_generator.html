<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AstrBot 插件开发提示词生成器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        
        .header h1 {
            font-size: 2em;
            margin-bottom: 10px;
        }
        
        .header p {
            opacity: 0.9;
        }
        
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .tab-btn {
            flex: 1;
            padding: 15px;
            background: rgba(255,255,255,0.2);
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .tab-btn:hover {
            background: rgba(255,255,255,0.3);
        }
        
        .tab-btn.active {
            background: white;
            color: #667eea;
            font-weight: bold;
        }
        
        .card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        
        .card-title {
            font-size: 1.3em;
            margin-bottom: 20px;
            color: #333;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #555;
        }
        
        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        
        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .form-group textarea {
            min-height: 100px;
            resize: vertical;
        }
        
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        
        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        
        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }
        
        .btn-secondary:hover {
            background: #e0e0e0;
        }
        
        .output-section {
            display: none;
        }
        
        .output-section.show {
            display: block;
        }
        
        .output-box {
            width: 100%;
            min-height: 300px;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-family: 'Monaco', 'Consolas', monospace;
            font-size: 13px;
            resize: vertical;
            background: #fafafa;
        }
        
        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        
        .tips {
            background: #f8f9fa;
            border-left: 4px solid #667eea;
            padding: 15px;
            border-radius: 0 8px 8px 0;
            margin-top: 20px;
        }
        
        .tips h4 {
            margin-bottom: 10px;
            color: #333;
        }
        
        .tips ul {
            margin-left: 20px;
            color: #666;
        }
        
        .tips li {
            margin-bottom: 5px;
        }
        
        .hidden {
            display: none !important;
        }
        
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #333;
            color: white;
            padding: 15px 30px;
            border-radius: 8px;
            opacity: 0;
            transition: all 0.3s;
            z-index: 1000;
        }
        
        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }
        
        @media (max-width: 600px) {
            .form-row {
                grid-template-columns: 1fr;
            }
            
            .tabs {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤖 AstrBot 插件开发提示词生成器</h1>
            <p>生成发送给 AI 的开发提示词</p>
        </div>
        
        <!-- 标签页 -->
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('generator')">📝 生成提示词</button>
            <button class="tab-btn" onclick="switchTab('docs')">📚 浏览文档</button>
        </div>
        
        <!-- 生成器标签页 -->
        <div id="generatorTab">
            <!-- 通用配置 -->
            <div class="card">
                <h2 class="card-title">⚙️ 基本配置</h2>
                <div class="form-row">
                    <div class="form-group">
                        <label>GitHub Token（可选）</label>
                        <input type="password" id="githubToken" placeholder="ghp_xxxx 用于自动发布">
                    </div>
                    <div class="form-group">
                        <label>开发指南路径</label>
                        <input type="text" id="guidePath" value="https://github.com/86lbs/astrbot_plugin_dev_guide">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>AstrBot 源码路径</label>
                        <input type="text" id="sourcePath" value="https://github.com/AstrBotDevs/AstrBot">
                    </div>
                    <div class="form-group">
                        <label>额外说明（可选）</label>
                        <input type="text" id="extraNotes" placeholder="其他需要说明的内容">
                    </div>
                </div>
            </div>
            
            <!-- 模式选择 -->
            <div class="card">
                <h2 class="card-title">📌 选择模式</h2>
                <div class="tabs" style="margin-bottom: 0;">
                    <button class="tab-btn active" onclick="selectMode('general')">🔧 通用模式</button>
                    <button class="tab-btn" onclick="selectMode('explain')">📖 讲解模式</button>
                </div>
            </div>
            
            <!-- 通用模式表单 -->
            <div id="generalForm" class="card">
                <h2 class="card-title">🔧 通用模式</h2>
                <p style="color: #666; margin-bottom: 20px;">适用于学习、开发、优化插件等多种场景</p>
                
                <div class="form-group">
                    <label>你的需求 *</label>
                    <textarea id="generalRequest" placeholder="描述你的需求，例如：&#10;- 学习 AstrBot 插件开发&#10;- 开发一个天气查询插件&#10;- 优化某个插件的代码&#10;- 帮我理解这个插件的工作原理"></textarea>
                </div>
                
                <div class="form-group">
                    <label>插件仓库链接（如有）</label>
                    <input type="text" id="generalRepo" placeholder="https://github.com/user/plugin">
                </div>
                
                <div class="tips">
                    <h4>💡 使用提示</h4>
                    <ul>
                        <li>描述越具体，生成的提示词越准确</li>
                        <li>如果是开发新插件，描述插件的功能需求</li>
                        <li>如果是优化插件，说明要优化的方面</li>
                        <li>如果是学习，说明想了解的内容</li>
                    </ul>
                </div>
            </div>
            
            <!-- 讲解模式表单 -->
            <div id="explainForm" class="card hidden">
                <h2 class="card-title">📖 讲解模式</h2>
                
                <div class="form-group">
                    <label>插件仓库链接 *</label>
                    <input type="text" id="explainRepo" placeholder="https://github.com/user/plugin">
                </div>
                
                <div class="form-group">
                    <label>你的问题</label>
                    <textarea id="explainQuestion" placeholder="想了解什么？例如：&#10;- 这个插件是如何工作的？&#10;- LLM Tool 是怎么被调用的？"></textarea>
                </div>
                
                <div class="form-group">
                    <label>讲解风格</label>
                    <select id="explainStyle">
                        <option value="simple">简单易懂，适合新手</option>
                        <option value="detailed">详细深入，包含原理</option>
                        <option value="technical">技术专业，使用术语</option>
                    </select>
                </div>
            </div>
            
            <!-- 生成按钮 -->
            <div class="card">
                <button class="btn btn-primary" onclick="generatePrompt()" style="width: 100%;">生成提示词</button>
            </div>
            
            <!-- 输出区域 -->
            <div id="outputSection" class="card output-section">
                <h2 class="card-title">📋 生成的提示词</h2>
                <textarea id="outputBox" class="output-box" readonly></textarea>
                <div class="btn-group">
                    <button class="btn btn-primary" onclick="copyPrompt()">复制</button>
                    <button class="btn btn-secondary" onclick="downloadPrompt()">下载</button>
                    <button class="btn btn-secondary" onclick="resetForm()">重置</button>
                </div>
            </div>
        </div>
        
        <!-- 文档标签页 -->
        <div id="docsTab" class="hidden">
            <div class="card">
                <h2 class="card-title">📚 开发文档</h2>
                <div style="display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px;">
                    <button class="btn btn-secondary" onclick="loadDoc('AGENT_ENTRY.md')">入口文档</button>
                    <button class="btn btn-secondary" onclick="loadDoc('SOURCE_CODE_MAP.md')">API 速查</button>
                    <button class="btn btn-secondary" onclick="loadDoc('SELF_REVIEW.md')">自我审查</button>
                    <button class="btn btn-secondary" onclick="loadDoc('PUBLISH_GUIDE.md')">发布指南</button>
                    <button class="btn btn-secondary" onclick="loadDoc('README.md')">README</button>
                </div>
                <div id="docContent" style="background: #f8f9fa; padding: 20px; border-radius: 8px; min-height: 300px;">
                    <p style="color: #666;">点击上方按钮加载文档...</p>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Toast -->
    <div class="toast" id="toast">✅ 已复制到剪贴板！</div>
    
    <script>
        let currentMode = 'general';
        
        // 切换标签页
        function switchTab(tab) {
            document.querySelectorAll('.tabs .tab-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            document.getElementById('generatorTab').classList.toggle('hidden', tab !== 'generator');
            document.getElementById('docsTab').classList.toggle('hidden', tab !== 'docs');
        }
        
        // 切换模式
        function selectMode(mode) {
            currentMode = mode;
            
            // 更新按钮样式
            document.querySelectorAll('#generatorTab .tabs .tab-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            // 显示对应表单
            document.getElementById('generalForm').classList.toggle('hidden', mode !== 'general');
            document.getElementById('explainForm').classList.toggle('hidden', mode !== 'explain');
            
            // 隐藏输出
            document.getElementById('outputSection').classList.remove('show');
        }
        
        // 生成提示词
        function generatePrompt() {
            const githubToken = document.getElementById('githubToken').value.trim();
            const guidePath = document.getElementById('guidePath').value.trim();
            const sourcePath = document.getElementById('sourcePath').value.trim();
            const extraNotes = document.getElementById('extraNotes').value.trim();
            
            let prompt = '';
            
            if (currentMode === 'general') {
                prompt = generateGeneralPrompt(githubToken, guidePath, sourcePath, extraNotes);
            } else {
                prompt = generateExplainPrompt(githubToken, guidePath, sourcePath, extraNotes);
            }
            
            if (prompt) {
                document.getElementById('outputBox').value = prompt;
                document.getElementById('outputSection').classList.add('show');
                document.getElementById('outputSection').scrollIntoView({ behavior: 'smooth' });
            }
        }
        
        function generateGeneralPrompt(githubToken, guidePath, sourcePath, extraNotes) {
            const request = document.getElementById('generalRequest').value.trim();
            const repo = document.getElementById('generalRepo').value.trim();
            
            if (!request) {
                alert('请填写你的需求！');
                return '';
            }
            
            let prompt = `## 任务
${request}

## GitHub Token
\`\`\`
${githubToken || '（未提供）'}
\`\`\`

## 开发资料
请使用 Token 通过 GitHub API 获取以下资料：

1. **开发指南**：${guidePath}
   - 完整的插件开发教程
   - API 文档和示例代码
   - 配置文件格式说明

2. **源码**：${sourcePath}
   - AstrBot 核心代码
   - 插件系统实现
`;
            
            if (repo) {
                prompt += `
## 相关仓库
${repo}
`;
            }
            
            if (extraNotes) {
                prompt += `
## 额外说明
${extraNotes}
`;
            }
            
            prompt += `
## 开发要求
1. 阅读开发指南了解插件开发规范
2. 参考源码了解 API 用法
3. 包含必要的文件：main.py、metadata.yaml、CHANGELOG.md、README.md
4. 进行自我审查确保代码质量
5. 如需发布，推送到 GitHub

## 自我审查要点
- logger 必须从 astrbot.api 导入
- filter 必须从 astrbot.api.event 导入
- 使用正确的返回方式：event.set_result(MessageEventResult().message("内容"))
- LLM Tool 文档字符串格式正确

## 注意
- 保护 Token 安全，不要在日志中输出
- 插件市场直接下载仓库源码，确保文件完整
`;
            
            return prompt;
        }
        
        function generateExplainPrompt(githubToken, guidePath, sourcePath, extraNotes) {
            const repo = document.getElementById('explainRepo').value.trim();
            const question = document.getElementById('explainQuestion').value.trim();
            const style = document.getElementById('explainStyle').value;
            
            if (!repo) {
                alert('请填写插件仓库链接！');
                return '';
            }
            
            const styleMap = {
                'simple': '简单易懂，适合新手理解',
                'detailed': '详细深入，包含原理说明',
                'technical': '技术专业，使用专业术语'
            };
            
            let prompt = `## 任务
讲解 AstrBot 插件代码。

## GitHub Token
\`\`\`
${githubToken || '（未提供）'}
\`\`\`

## 参考资料
请使用 Token 通过 GitHub API 获取以下资料：

1. **开发指南**：${guidePath}
   - API 文档
   - 开发规范

2. **源码**：${sourcePath}
   - AstrBot 核心代码

## 插件仓库
${repo}
`;
            
            if (question) {
                prompt += `
## 我的问题
${question}
`;
            }
            
            prompt += `
## 讲解风格
${styleMap[style]}

## 讲解要求
1. 解释代码的整体结构
2. 说明关键 API 的用法
3. 解释装饰器的作用
4. 说明数据流向
5. 指出需要注意的地方

## 注意
保护 Token 安全，不要在日志中输出。
`;
            
            if (extraNotes) {
                prompt += `
## 额外说明
${extraNotes}
`;
            }
            
            return prompt;
        }
        
        // 加载文档
        async function loadDoc(docName) {
            const docContent = document.getElementById('docContent');
            docContent.innerHTML = '<p style="color: #666;">加载中...</p>';
            
            try {
                const url = `https://raw.githubusercontent.com/86lbs/astrbot_plugin_dev_guide/main/${docName}`;
                const response = await fetch(url);
                
                if (!response.ok) {
                    throw new Error('文档加载失败');
                }
                
                const text = await response.text();
                docContent.innerHTML = `<pre style="white-space: pre-wrap; word-wrap: break-word; margin: 0;">${escapeHtml(text)}</pre>`;
                
            } catch (error) {
                docContent.innerHTML = `<p style="color: #e74c3c;">文档加载失败：${error.message}</p><p><a href="https://github.com/86lbs/astrbot_plugin_dev_guide/blob/main/${docName}" target="_blank">点击查看 GitHub 原文</a></p>`;
            }
        }
        
        function escapeHtml(text) {
            return text
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;');
        }
        
        // 复制
        function copyPrompt() {
            const text = document.getElementById('outputBox').value;
            navigator.clipboard.writeText(text).then(() => {
                const toast = document.getElementById('toast');
                toast.classList.add('show');
                setTimeout(() => toast.classList.remove('show'), 2000);
            });
        }
        
        // 下载
        function downloadPrompt() {
            const text = document.getElementById('outputBox').value;
            const blob = new Blob([text], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `prompt_${currentMode}_${Date.now()}.txt`;
            a.click();
            URL.revokeObjectURL(url);
        }
        
        // 重置
        function resetForm() {
            document.getElementById('generalRequest').value = '';
            document.getElementById('generalRepo').value = '';
            document.getElementById('explainRepo').value = '';
            document.getElementById('explainQuestion').value = '';
            document.getElementById('outputSection').classList.remove('show');
        }
    </script>
</body>
</html>
