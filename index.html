<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AstrBot 插件开发指南</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            width: 100%;
        }

        .card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
            text-align: center;
        }

        .logo {
            font-size: 4em;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 2.5em;
            color: #333;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #666;
            font-size: 1.2em;
            margin-bottom: 30px;
        }

        .btn-group {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
            margin-bottom: 30px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 15px 30px;
            border: none;
            border-radius: 12px;
            font-size: 1.1em;
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
            transform: translateY(-2px);
        }

        .features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 30px;
            text-align: left;
        }

        .feature {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 12px;
        }

        .feature h3 {
            color: #667eea;
            margin-bottom: 8px;
            font-size: 1.1em;
        }

        .feature p {
            color: #666;
            font-size: 0.95em;
            line-height: 1.5;
        }

        .footer {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #eee;
            color: #888;
            font-size: 0.9em;
        }

        .footer a {
            color: #667eea;
            text-decoration: none;
        }

        .footer a:hover {
            text-decoration: underline;
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 1.8em;
            }

            .card {
                padding: 25px;
            }

            .btn {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="logo">🤖</div>
            <h1>AstrBot 插件开发指南</h1>
            <p class="subtitle">使用 AI 快速开发 AstrBot 插件</p>

            <div class="btn-group">
                <a href="./prompt_generator.html" class="btn btn-primary">
                    ✨ 生成开发提示词
                </a>
                <a href="https://github.com/86lbs/astrbot_plugin_dev_guide" class="btn btn-secondary">
                    📦 GitHub 仓库
                </a>
            </div>

            <div class="features">
                <div class="feature">
                    <h3>📝 提示词生成器</h3>
                    <p>可视化填写插件需求，自动生成完整的开发提示词</p>
                </div>
                <div class="feature">
                    <h3>🧪 本地测试环境</h3>
                    <p>一键部署 Ollama + AstrBot 完全自包含的测试环境</p>
                </div>
                <div class="feature">
                    <h3>📦 完整工具集</h3>
                    <p>消息模拟、自动化测试、日志查看等开发工具</p>
                </div>
                <div class="feature">
                    <h3>🚀 版本管理</h3>
                    <p>自动生成版本号和更新日志，支持发布到插件市场</p>
                </div>
            </div>

            <div class="footer">
                <p>
                    <a href="https://astrbot.app">AstrBot 官网</a> ·
                    <a href="https://github.com/AstrBotDevs/AstrBot">AstrBot 源码</a> ·
                    <a href="https://github.com/86lbs/astrbot_plugin_dev_guide">开发指南仓库</a>
                </p>
            </div>
        </div>
    </div>
</body>
</html>
